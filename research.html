---
layout: post
title: research
---

<section class="list">
    {% for post in site.posts %}
        {% if post.research %}
            <div class="item {% if post.star %}star{% endif %}">
                {% if post.image %}
                    <div class="image">
                        <img class="backgroundimage" src="{{post.image}}" border="0" alt=""/>
                        <a class="url" href="{% if post.externalLink %}{{ post.externalLink }}{% else %}{{ site.url }}{{ post.url }}{% endif %}">
                            <aside><time datetime="{{ post.date | date:"%d-%m-%Y" }}">{{ post.date | date: "%b %d %Y" }}</time></aside>
                            {{ post.jemoji }}
                            <h3 class="title">{{ post.title }}</h3>
                            <h3 class="description">{{ post.description }}</h3>     
                        </a>
                    </div>
                {% endif %}      
            </div>
        {% endif %}
    {% endfor %}
</section>
